aid: nodeping
name: NodePing
description: >-
  NodePing provides uptime monitoring for websites and services with flat-rate
  plans that include unlimited international SMS notifications and unlimited
  users. The REST API exposes accounts, contacts, contact groups, schedules,
  checks, results, notifications, and probe info.
